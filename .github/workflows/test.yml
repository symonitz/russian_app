name: tests
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python deps + data tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest regex   # accent.py imports `regex`; the RUAccent model is NOT loaded by these tests
          python -m pytest tests/test_accent.py tests/test_accent_dataset.py tests/test_dataset_integrity.py -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Node deps
        run: npm ci
      - name: Worker unit tests
        run: npm test
      - name: Playwright
        run: |
          npx playwright install --with-deps chromium
          npx playwright test
